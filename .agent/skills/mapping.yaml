version: 2
project: "Olasılık"
owner_intent: "Temel kitaba sadık, kapsam denetimli, pedagojik olarak güçlü ve lutbeamer uyumlu haftalık ders sunumları üretmek"

rules:
  always_on_file: ".agent/rules/rules.md"
  precedence:
    - "rules.md mapping'den üstündür."
    - "mapping skill seçimini ve rol sınırlarını belirler."
    - "helper skill'ler scope otoritesi değildir."

architecture:
  orchestrator:
    name: "weekly_deck_orchestrator"
    path: ".agent/skills/weekly_deck_orchestrator/SKILL.md"
  active_agents:
    - name: "book_grounder"
      path: ".agent/skills/book_grounder/SKILL.md"
      role: "Kitabı parçalar, context çıkarır, source pack üretir."
    - name: "deck_architect"
      path: ".agent/skills/deck_architect/SKILL.md"
      role: "Hafta kapsamını, kavram sırasını ve frame planını kurar."
    - name: "question_design_agent"
      path: ".agent/skills/question_design_agent/SKILL.md"
      role: "Soruların bağlamını, zorluk dengesini ve örnek-soru zincirini denetler."
    - name: "slide_composer"
      path: ".agent/skills/slide_composer/SKILL.md"
      role: "LaTeX/lutbeamer deck'i üretir."
    - name: "deck_guard"
      path: ".agent/skills/deck_guard/SKILL.md"
      role: "Scope, pedagoji, Türkçe bütünlük ve derleme kapısını denetler."
  helper_skills:
    - name: "book_to_slide_source_pipeline"
      path: ".agent/skills/book_to_slide_source_pipeline/SKILL.md"
    - name: "pdf_book_processor"
      path: ".agent/skills/pdf_book_processor/SKILL.md"
    - name: "latex_presentation_assistant"
      path: ".agent/skills/latex_presentation_assistant/SKILL.md"
    - name: "question_frame_visual_layout"
      path: ".agent/skills/question_frame_visual_layout/SKILL.md"

routing:
  - id: "weekly_book_grounded_deck"
    intent_patterns:
      - "tek promptla haftalik sunum"
      - "kitaba bagli haftalik sunum"
      - "hafta ve konuyu verdigimde sunumu hazirla"
      - "kitaptan uyumlu ders sunumu olustur"
      - "ilgili hafta icin profesyonel egitim materyali sunumu"
    primary_skill:
      name: "weekly_deck_orchestrator"
      path: ".agent/skills/weekly_deck_orchestrator/SKILL.md"
    supporting_skills:
      - ".agent/skills/book_grounder/SKILL.md"
      - ".agent/skills/deck_architect/SKILL.md"
      - ".agent/skills/question_design_agent/SKILL.md"
      - ".agent/skills/slide_composer/SKILL.md"
      - ".agent/skills/deck_guard/SKILL.md"
    helper_skills:
      - ".agent/skills/book_to_slide_source_pipeline/SKILL.md"
      - ".agent/skills/pdf_book_processor/SKILL.md"
      - ".agent/skills/latex_presentation_assistant/SKILL.md"
      - ".agent/skills/question_frame_visual_layout/SKILL.md"
    required_resources:
      - ".agent/rules/rules.md"
      - ".agent/skills/weekly_deck_orchestrator/references/decision-contract.md"
      - ".agent/skills/question_design_agent/references/question-quality-checklist.md"
      - ".agent/skills/create_weekly_presentation/references/source-selection.md"
      - ".agent/skills/create_weekly_presentation/references/deck-pattern.md"
      - ".agent/skills/create_weekly_presentation/assets/weekly_deck_base.tex"
      - ".agent/skills/create_weekly_presentation/scripts/extract_chapter_context.py"
      - ".agent/skills/create_weekly_presentation/scripts/extract_subsection_context.py"
      - ".agent/skills/create_weekly_presentation/scripts/build_slide_source_pack.py"
      - ".agent/skills/create_weekly_presentation/scripts/validate_turkish_latex.py"
    enforce_rule_blocks:
      - "5. Kitap ve Kapsam Kuralları"
      - "6. Pedagoji Kuralları"
      - "7. Üretim Kuralları"
      - "8. Derleme ve Bütünlük"
      - "9. Review Gate"
      - "10. Token Disiplini"
    output_contract:
      - "Deck önce kitapla uyumlu kaynak pakete zeminlenir, sonra planlanır, sonra yazılır."
      - "Deck 60 frameden kısa olamaz; kitap aynı hafta kapsamında daha fazlasını destekliyorsa daha uzun deck tercih edilir."
      - "Matematik kitaplarında formula, tablo ve grafik taşıyan sayfalar extraction sinyalleriyle izlenir; placeholder veya zayıf OCR deck gerekçesi olamaz."
      - "Sorular kitapla uyumlu ama doğal Türkçe ile, gerçekçi bağlamda ve zorluk dengesi gözetilerek kurulmalıdır."
      - "Deck review kapısından geçmeden teslim edilmez."
      - "Kapsam dışı konu varsayılan olarak reddedilir."

  - id: "book_grounding_only"
    intent_patterns:
      - "kitabi source packe cevir"
      - "chapter context cikar"
      - "subsection manifest olustur"
      - "ham pdf yerine deck source pack hazirla"
    primary_skill:
      name: "book_grounder"
      path: ".agent/skills/book_grounder/SKILL.md"
    helper_skills:
      - ".agent/skills/book_to_slide_source_pipeline/SKILL.md"
      - ".agent/skills/pdf_book_processor/SKILL.md"
    required_resources:
      - ".agent/skills/weekly_deck_orchestrator/references/decision-contract.md"
      - ".agent/skills/create_weekly_presentation/scripts/extract_chapter_context.py"
      - ".agent/skills/create_weekly_presentation/scripts/extract_subsection_context.py"
      - ".agent/skills/create_weekly_presentation/scripts/build_slide_source_pack.py"
      - ".agent/skills/pdf_book_processor/scripts/extract_sections.py"
    enforce_rule_blocks:
      - "5. Kitap ve Kapsam Kuralları"
      - "10. Token Disiplini"

  - id: "deck_architecture_only"
    intent_patterns:
      - "haftanin kapsam planini cikar"
      - "frame iskeleti kur"
      - "pedagojik akisi planla"
      - "hangi konular in scope belirle"
    primary_skill:
      name: "deck_architect"
      path: ".agent/skills/deck_architect/SKILL.md"
    required_resources:
      - ".agent/skills/weekly_deck_orchestrator/references/decision-contract.md"
      - ".agent/skills/deck_architect/references/blueprint-pattern.md"
      - ".agent/skills/create_weekly_presentation/references/source-selection.md"
      - ".agent/skills/create_weekly_presentation/references/deck-pattern.md"
      - ".agent/skills/create_weekly_presentation/assets/weekly_deck_base.tex"
    enforce_rule_blocks:
      - "5. Kitap ve Kapsam Kuralları"
      - "6. Pedagoji Kuralları"
      - "10. Token Disiplini"

  - id: "slide_composition_only"
    intent_patterns:
      - "latex decki yaz"
      - "sunum govdesini uret"
      - "plani lutbeamer sunumuna cevir"
      - "haftalik tex dosyasini doldur"
    primary_skill:
      name: "slide_composer"
      path: ".agent/skills/slide_composer/SKILL.md"
    helper_skills:
      - ".agent/skills/latex_presentation_assistant/SKILL.md"
      - ".agent/skills/question_frame_visual_layout/SKILL.md"
    required_resources:
      - ".agent/skills/weekly_deck_orchestrator/references/decision-contract.md"
      - ".agent/skills/question_design_agent/references/question-quality-checklist.md"
      - ".agent/skills/create_weekly_presentation/assets/weekly_deck_base.tex"
      - ".agent/skills/question_frame_visual_layout/examples/01_soru_frame_ve_gorsel_standardi.tex"
      - ".agent/skills/latex_presentation_assistant/examples/10_icerik_boxlari.tex"
      - ".agent/skills/latex_presentation_assistant/examples/11_hizali_cift_sutun_box.tex"
    enforce_rule_blocks:
      - "6. Pedagoji Kuralları"
      - "7. Üretim Kuralları"
      - "8. Derleme ve Bütünlük"

  - id: "deck_guard_only"
    intent_patterns:
      - "sunumu review et"
      - "scope leakage var mi kontrol et"
      - "pedagojik review yap"
      - "turkce butunluk denetimi yap"
    primary_skill:
      name: "deck_guard"
      path: ".agent/skills/deck_guard/SKILL.md"
    required_resources:
      - ".agent/skills/weekly_deck_orchestrator/references/decision-contract.md"
      - ".agent/skills/question_design_agent/references/question-quality-checklist.md"
      - ".agent/skills/deck_guard/references/review-checklist.md"
      - ".agent/skills/create_weekly_presentation/scripts/validate_turkish_latex.py"
    enforce_rule_blocks:
      - "5. Kitap ve Kapsam Kuralları"
      - "6. Pedagoji Kuralları"
      - "8. Derleme ve Bütünlük"
      - "9. Review Gate"

  - id: "generic_lutbeamer_edit"
    intent_patterns:
      - "lutbeamer sunum"
      - "frame ekle"
      - "ornek ekle"
      - "soru ekle"
      - "cozum ekle"
      - "ozet ekle"
      - "kapanis ekle"
    primary_skill:
      name: "latex_presentation_assistant"
      path: ".agent/skills/latex_presentation_assistant/SKILL.md"
    helper_skills:
      - ".agent/skills/question_frame_visual_layout/SKILL.md"
    enforce_rule_blocks:
      - "7. Üretim Kuralları"
      - "8. Derleme ve Bütünlük"

  - id: "ocr_homework_builder"
    intent_patterns:
      - "ocr odev hazirla"
      - "cevap kagidi ekle"
      - "aruco lu odev"
    primary_skill:
      name: "latex_ocr_homework_builder"
      path: ".agent/skills/latex_ocr_homework_builder/SKILL.md"

  - id: "question_design_only"
    intent_patterns:
      - "sorulari guclendir"
      - "soru baglamini iyilestir"
      - "soru kurgusunu dogallastir"
      - "zorluk dengesini kontrol et"
    primary_skill:
      name: "question_design_agent"
      path: ".agent/skills/question_design_agent/SKILL.md"
    required_resources:
      - ".agent/skills/weekly_deck_orchestrator/references/decision-contract.md"
      - ".agent/skills/question_design_agent/references/question-quality-checklist.md"
      - ".agent/skills/create_weekly_presentation/references/source-selection.md"
    enforce_rule_blocks:
      - "6. Pedagoji Kuralları"
      - "9. Review Gate"

legacy:
  create_weekly_presentation:
    status: "compatibility_alias"
    replacement: "weekly_deck_orchestrator + deck_architect"
  question_frame_visual_layout:
    status: "helper_mode"
    used_by: "question_design_agent + slide_composer"
  pdf_book_processor:
    status: "tool_mode"
    used_by: "book_grounder"
  latex-beamer-zebra-syllabus-table:
    status: "snippet_only"

fallback:
  strategy: "minimal_book_grounded_route"
  when:
    - "Intent hicbir route ile eslesmiyorsa"
    - "Eski create_weekly_presentation aliskanligiyle benzer istek geliyorsa"
  behavior:
    - "Haftalik kitap tabanli deck gorevlerinde weekly_deck_orchestrator varsayilir."
    - "Genel lutbeamer duzenlemelerinde latex_presentation_assistant varsayilir."
